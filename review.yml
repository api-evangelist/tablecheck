actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket (or SSE) protocol surface exists on any TableCheck API
    component. Every documented component is request/response JSON REST over
    HTTPS. No AsyncAPI document was created because there is no server-push
    transport on TableCheck's own API to model.
