  endpointsModeled: false
  endpointsModeledNote: |
    Endpoints above are transcribed from TableCheck's own published OpenAPI 3.0
    documents (served at .../<component>/v1/docs) and the Confluence API space,
    not modeled. The OpenAPI files under openapi/ are TableCheck's published
    specifications, copied verbatim (with one minimal fix: a duplicate YAML
    anchor &ForbiddenError in the POS spec was de-duplicated so strict parsers
    accept it; no endpoint or schema content was changed).
