aid: tablecheck
name: TableCheck
review:
  question: Does TableCheck expose a documented public WebSocket API?
  answer: false
  date: '2026-07-05'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Every documented TableCheck API component
    (Availability, Web Booking, Booking, CRM, POS, Site Controller) is
    request/response JSON REST over HTTPS under https://api.tablecheck.com/api.
    There is no server-push transport - no WebSocket and no Server-Sent Events
    (SSE) - documented on any TableCheck component to model. The "near real-time"
    availability behavior of the Availability API is delivered by polling REST
    endpoints (search, timetable, calendar), not by a streaming channel.
findings:
  summary: |
    TableCheck does not publish a documented public WebSocket API. TableCheck is
    a restaurant booking and guest-experience platform. Its public API is a
    JSON document-based REST API served only in a Production environment at
    https://api.tablecheck.com/api, partitioned into versioned components with
    the path shape /<component>/<component_version>/<resource>. Authentication is
    an API key (a secret_key) sent in the Authorization HTTP header
    (securityScheme type apiKey, in: header, name: AUTHORIZATION). All six
    documented components are plain HTTPS REST; each ships an OpenAPI 3.0.0
    description reachable at .../<component>/v1/docs. No realtime, bidirectional,
    or streaming WebSocket (ws:// or wss://) endpoint, and no SSE stream, is
    documented anywhere in the TableCheck API space.
  accessModel: |
    Partner-gated. TableCheck provides only a Production API environment. One
    secret_key per environment is issued by the TableCheck API team
    (api@tablecheck.com) at the time API access is approved; there is no
    self-serve key issuance or sandbox environment. The Booking API (writing
    reservations directly into TableCheck's inventory backend) is available only
    by special arrangement - most integrators are expected to use the read-only
    Web Booking API plus TableCheck's hosted web booking flow instead.
  openSource: |
    TableCheck is an engineering-forward company with public open-source
    presence on GitHub (github.com/tablecheck and github.com/TableCheck-Labs),
    but the reservation/availability/CRM/POS platform APIs themselves are a
    hosted commercial product, not an open-source or self-hostable server.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.tablecheck.com/api
      documented: true
      note: All six components (availability, web_booking, booking, crm, pos, site) are JSON REST over HTTPS. Production only; no sandbox.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events stream is documented on any TableCheck component.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in the TableCheck API space as of the review date.
