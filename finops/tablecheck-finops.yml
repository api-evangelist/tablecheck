meters:
- name: location_subscription
  description: Per-venue platform subscription; the primary TableCheck charge, quoted per location.
  unit: locations
  aggregation: sum
  dimensions:
  - account
  - location
- name: direct_reservations
  description: Reservations booked via TableCheck's own widget; commission-free (tracked for value, not billed per cover).
  unit: covers
  aggregation: sum
  dimensions:
  - account
  - location
- name: api_requests
  description: Partner API requests across components; rate-limited (10k / 5 min per component) but not metered for billing.
  unit: requests
  aggregation: sum
  dimensions:
  - account
  - component
principles:
- name: Visibility
  description: Track spend per location and per brand; monitor which venues use API integrations (POS, CRM, Availability) so subscription cost maps to usage.
- name: Allocation
  description: Map each per-location subscription to the owning venue, brand, or franchise cost center.
- name: Optimization
  description: Favor commission-free direct bookings through TableCheck's own widget over cover-fee marketplaces; consolidate group locations under an enterprise agreement to negotiate per-location rates.
- name: Accountability
  description: Assign an owner per location/brand and review subscription spend against booking volume and covers seated each billing period.
