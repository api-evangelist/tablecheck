description: >-
  FinOps view of TableCheck spend. TableCheck is a per-location SaaS platform,
  not a usage-metered API product: the dominant cost is a per-venue
  subscription quoted by TableCheck sales, plus any enterprise/group agreement.
  Direct online reservations taken through TableCheck's own booking widget are
  commission-free, so unlike cover-fee marketplaces there is generally no
  per-cover charge on first-party bookings. API access (Availability, Web
  Booking, Booking, CRM, POS, Site Controller) is partner-gated and enabled for
  platform customers/partners rather than billed as a separate line item; there
  is no public per-request API price. Rate limiting (10,000 requests / 5 min per
  component) is a stability control, not a metered charge.
notes: >-
  No public per-unit or per-location rates are available; figures are quoted by
  TableCheck sales. Treat the billing model below as structural (subscription +
  commission-free direct bookings + enterprise), not as reconciled pricing.
