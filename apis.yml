aid: tablecheck
url: https://raw.githubusercontent.com/api-evangelist/tablecheck/refs/heads/main/apis.yml
name: TableCheck
kind: company
description: TableCheck is a restaurant booking and guest-experience platform (founded
  2011, headquartered in Tokyo, Japan) used by thousands of restaurants across 35+
  countries to consolidate reservations, availability, guest CRM, memberships, and
  POS integration into one system. TableCheck exposes a production JSON/REST API,
  partitioned into components - Availability, Web Booking, Booking, CRM, POS, and
  Site Controller - under https://api.tablecheck.com/api. Access is partner-gated,
  and a per-environment secret_key is issued by the TableCheck API team on approval, while
  some components (notably the direct Booking API) are available only by special
  arrangement. Each component publishes an OpenAPI 3.0 description.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Restaurant
- Reservations
- Booking
- Hospitality
- Availability
- Guest CRM
- Point of Sale
- Japan
