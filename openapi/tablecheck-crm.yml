                $ref: "#/components/schemas/Error"

  /franchises:
    get:
      summary: List all Franchises
      operationId: listFranchises
      tags:
        - franchises
      parameters:
        - name: ids
          in: query
          description: Array or comma-separated list of specific IDs to return.
          required: false
          schema:
            type: string
            format: bson-id
        - name: names
          in: query
          description: Array or comma-separated list of specific IDs to return.
          required: false
          schema:
            type: string
            format: bson-id
        - name: slugs
          in: query
          description: Array or comma-separated list of specific slugs to return.
          required: false
          schema:
            type: string
            format: bson-id
        - name: page
          in: query
          description: The zero-based page number. Used for pagination.
          required: false
          schema:
            type: number
            format: integer
            minimum: 0
        - name: per_page
          in: query
          description: Number of items to return at once. Used for pagination.
          required: false
          schema:
            type: number
            format: integer
            default: 100
            minimum: 1
            maximum: 1000
        - $ref: '#/components/parameters/IncludeFields'
        - $ref: '#/components/parameters/ExcludeFields'

      responses:
        '200':
          description: A paged array of franchises
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FranchisesListResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /franchises/{franchise_id}:
    get:
      summary: Fetch a specific Franchise
      operationId: showFranchiseById
      tags:
        - franchises
      parameters:
        - name: franchise_id
          in: path
          required: true
          description: The ID or slug of the Franchise to retrieve
          schema:
            type: string
      responses:
        '200':
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FranchiseShowResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /shops/{shop_id}:
    get:
      summary: Fetch a specific Shop
      operationId: showShopById
      tags:
        - shops
      parameters:
        - name: shop_id
          in: path
          required: true
          description: The ID or slug of the Shop to retrieve
          schema:
            type: string
      responses:
        '200':
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShopShowResponse"
        default:
          description: Error response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: Authorization

  parameters:
    IncludeFields:
      name: include_fields
      in: query
      description: Comma-separated list of fields to include in the response (whitelist). If specified, only the listed fields will be returned. Supports dot notation for nested fields.
      required: false
      schema:
        type: string
      example: id,name,addresses.city
    ExcludeFields:
      name: exclude_fields
      in: query
      description: Comma-separated list of fields to exclude from the response (blacklist). All fields except the given ones will be returned. Supports dot notation for nested fields.
      required: false
      schema:
        type: string
      example: created_at,socials.username

  schemas:
    Reservation:
      properties:
        id:
          description: Database ID of the Reservation.
          type: string
          format: bson-id
          example: ae5355ca1fd337ed5d6893e2
        ref:
          type: string
          description: Your identifier for the Reservation.
        franchise_id:
          description: The ID of Franchise to which the Reservation belongs.
          type: string
          format: bson-id
        shop_id:
          description: The ID of Shop to which the Reservation belongs.
          type: string
          format: bson-id
        customer_ids:
          description: The IDs of the Customers to which the Reservation belongs.
          type: array
          items:
            type: string
            format: bson-id
        primary_customer_id:
          description: The ID of primary Customer of Reservation. Refer to "customers" array.
          type: string
          format: bson-id
          example: ede535ea33fd275ca15d6893
        table_ids:
          description: The IDs of the Tables where the Reservation will be seated.
          type: array
          items:
            type: string
            format: bson-id
        service_category_id:
          description: The database ID of the ServiceCategory assigned to the Reservation.
          type: string
          format: bson-id
        promo_id:
          description: The database ID of the Promo assigned to the Reservation.
          type: string
          format: bson-id
        created_at:
          description: The timestamp of when the Reservation was created.
          type: string
          format: date-time
        updated_at:
          description: The timestamp of when the Reservation was last updated.
          type: string
          format: date-time
        start_at:
          description: The time at which the party is scheduled to arrive for the Reservation.
          type: string
          format: date-time
          example: '2020-01-29T19:15:00Z'
        duration:
          description: The planned duration of the Reservation in seconds.
          type: number
          format: seconds
          example: 7200
        pax:
          description: The total party size of the Reservation. This is the sum of the other pax fields.
          type: number
          format: integer
          example: 6
        pax_adult:
          description: The number of adults attending the Reservation.
          type: number
          format: integer
          example: 3
        pax_senior:
          description: The number of senior citizens attending the Reservation.
          type: number
          format: integer
          example: 2
        pax_child:
          description: The number of children attending the Reservation.
          type: number
          format: integer
          example: 0
        pax_baby:
          description: The number of babies attending the Reservation.
          type: number
          format: integer
          example: 1
        status:
          description: The status of the Reservation.
          type: string
          enum: ["tentative","pending","request","accepted","confirmed","delay","call_absent","call_message","call_wrong","cancelled","noshow","rejected","arrived","arrived_part","waiting","waitlist_called","seated","seated_part","service_drink","service_main","service_dessert","check_req","paid","turnover","turned_over"]
        source:
          description: The general method by which the Reservation was made (web, phone, etc.)
          type: string
          example: web
        channel:
          description: The web site or sales channel by which the Reservation was made.
          type: string
          example: instagram
        provider:
          description: The system used to process the Reservation (tablecheck, etc.)
          type: string
          example: tablecheck
        provider_ref:
          description: The Reservation ID according to the system which processed the Reservation.
          type: string
          example: ABC123DEF
        points:
          description: The number of reward points redeemed by the customer via the provider system.
          type: number
          format: integer
          example: 200
        seat_types:
          description: The seating or table type(s) requested by the customer.
          type: array
          items:
            type: string
            enum: ["open","counter","outside","curtain","private","tatami"]
        smoking:
          description: Indicates whether the customer has requested smoking or non-smoking seats.
          type: string
          enum: ["none","true","false"]
        special_request:
          description: Free-text additional request made by the customer at time of booking. May be used to include special requests, dietary restrictions, etc.
          type: string
        memo:
          description: A free-text internal memo for the Reservation used only by merchant staff. Contains notes about the reservation, customer, or other details.
          type: string
        memo2:
          description: Secondary free-text internal memo for the Reservation used only by merchant staff.
          type: string
        visit_history:
          description: An enumeration indicating roughly how many times the customer has visited the restaurant.
          type: string
          enum:
            - new
            - visit2
            - visit3
            - repeater
            - walk_in
            - no_customer
        party_name:
          description: The party or group name for the reservation.
          type: string
        room_name:
          description: The hotel room number associated with the reservation.
          type: string
        cancel_reason_type:
          description: The enumerated reason for cancellation, if the reservation was cancelled.
          type: string
          enum: ["mistake","shop","travel","deal","delay","personal","covid","other"]
        cancel_reason:
          description: The memo explaining the reason for cancellation, if the reservation was cancelled.
          type: string
        cancelled_by_customer:
          description: If the reservation was cancelled, this flag if true indicates the cancellation action was performed by the customer (diner) via the web. A false value indicates the cancellation was performed either by the merchant or (in rare cases) automatically by the system.
          type: boolean
        send_emails:
          description: Indicates whether to send the customer email notifications for this reservation.
          type: boolean
        send_texts:
          description: Indicates whether to send the customer text message notifications for this reservation.
          type: boolean
        enable_sms:
          description: Deprecated. Please use send_texts instead.
          type: boolean
        email:
          description: "[PII] The email address designated by the customer to receive notifications for this reservation."
          type: string
          format: email
        phone:
          description: "[PII] The phone number designated by the customer to receive calls regarding this reservation."
          type: string
          format: phone-e164
        sms_number:
          description: "[PII] The mobile number designated by the customer to receive SMS notifications for this reservation. The sms_number cannot be set directly; it is using the phone parameter."
          type: string
          format: phone-e164
        franchise:
          $ref: "#/components/schemas/FranchiseEmbed"
        shop:
          $ref: "#/components/schemas/ShopEmbed"
        customers:
          type: array
          items:
            $ref: "#/components/schemas/CustomerEmbed"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageEmbed"
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderEmbed"
        pos_journals:
          type: array
          items:
            $ref: "#/components/schemas/PosJournalEmbed"
        payments:
          type: array
          items:
            $ref: "#/components/schemas/PaymentEmbed"
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuestionEmbed"
        tables:
          type: array
          items:
            $ref: "#/components/schemas/TableEmbed"
        service_category:
          $ref: "#/components/schemas/ServiceCategoryEmbed"
        promo:
          $ref: "#/components/schemas/PromoEmbed"

    ReservationFlag:
      type: object
      properties:
        id:
          description: TableCheck's database ID of the Reservation Flag.
          type: string
          format: bson-id
          example: ae5355ca1fd337ed5d6893e2
        franchise_id:
          description: The ID of Franchise to which the Reservation Flag belongs.
          type: string
          format: bson-id
        shop_ids:
          description: |
            Constrains the Shops for which the Reservation Flag will be applied.
            An empty array means "all Shops" (no restriction).
          type: array
          default: []
          items:
            type: string
            format: bson-id
            example: ae5355ca1fd337ed5d6893e2
        all_shops:
          description: Apply the Reservation Flag to all shops.
          type: boolean
        name:
          description: Reservation Flag name.
          type: string
        description:
          description: Reservation Flag description.
          type: string
        icon:
          description: Reservation Flag icon name.
          type: string
        color:
          description: Reservation Flag icon color.
          type: string
        created_at:
          description: The timestamp of when the Reservation was created.
          type: string
          format: date-time
          example: '2020-01-29T19:12:34Z'
        updated_at:
          description: The timestamp of when the Reservation was last updated.
          type: string
          format: date-time
          example: '2020-01-29T19:12:34Z'

    FranchiseEmbed:
      type: object
      properties:
        id:
          description: ID of the Franchise.
          type: string
          format: bson-id
          example: a33e5357ed5d6893e5ca1fd2
        name:
          description: The name of the Franchise.
          type: object
          format: string
          example: "The Midtown Hotel"

    ShopEmbed:
      type: object
      properties:
        id:
          description: ID of the Shop to which the Reservation belongs.
          type: string
          format: bson-id
          example: ede535ea33fd275ca15d6893
        name_translations:
          description: The name of the Shop where the reservation was booked.
          type: object
          format: translations
          example:
            en: "Paris Cafe"
            fr: "Café de Paris"
            ja: "カフェデパリ"
        internal_name:
          description: The shorthand name of the Shop where the reservation was booked.
          type: object
          format: string
          example: "Paris Cafe"
        slug:
          description: The web ID of the Shop where the reservation was booked.
          type: string
          example: my-shop-slug
        country:
          description: The country where the Shop is located.
          type: string
          format: country
          example: JP
        currency:
          description: The monetary currency used by the Shop.
          type: string
          format: currency
          example: JPY
        time_zone:
          description: The time zone used by the Shop.
          type: string
          format: time-zone
          example: Asia/Tokyo

    Customer:
      type: object
      properties:
        id:
          description: The database ID of the Customer.
          type: string
          format: bson-id
        ref:
          type: string
          description: Your identifier for the customer.
        franchise_id:
          description: The ID of Franchise to which the Customer belongs.
          type: string
          format: bson-id
        created_at:
          type: string
        updated_at:
          type: string
        name:
          description: "[PII] The full name of the customer."
          type: string
        first_name:
          description: "[PII] The first name of the customer."
          type: string
        last_name:
          description: "[PII] The last name of the customer."
          type: string
        alt_first_name:
          description: "[PII] The alternate (e.g. kanji) first name of the customer."
          type: string
        alt_last_name:
          description: "[PII] The alternate (e.g. kanji) last name of the customer."
          type: string
        alpha_first_name:
          description: "[PII] The alphabetical first name of the customer."
          type: string
        alpha_last_name:
          description: "[PII] The alphabetical last name of the customer."
          type: string
        company_name:
          type: string
        company_title:
          type: string
        company_division:
          type: string
        gender:
          type: string
          enum: ["male","female"]
        # TODO!!! - API locale
        locale:
          type: string
          enum: ["en","ja","ko","zh-CN","zh-TW","de","es","fr","nl","it","pt","tr","ru","id","ms","tl","th","lo","km","vi","ar","he","hi"]
        source:
          description: The channel by which the Customer data was obtained.
          type: string
          enum: ["manual","tablecheck_guest","tablecheck_user","ota","ivr","pms","import","api","edm_subscribe"]
        memo:
          description: Free-text memo
          type: string
        phones:
          description: "[PII] Phone numbers as an array of strings."
          $ref: "#/components/schemas/PhoneNumbersList"
        phone_objects:
          description: "[PII] Phone numbers as structured objects."
          $ref: "#/components/schemas/Phones"
        emails:
          description: "[PII] Email addresses as an array of strings."
          $ref: "#/components/schemas/EmailAddressesList"
        email_objects:
          description: "[PII] Email addresses as structured objects."
          $ref: "#/components/schemas/Emails"
        events:
          description: "[PII] Calendar events such as birthday, anniversary, etc."
          type: array
          items:
            $ref: "#/components/schemas/Event"
        socials:
          description: "[PII] Social media accounts"
          type: array
          items:
            $ref: "#/components/schemas/Social"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ImageEmbed"
        tags:
          type: array
          items:
            type: string
        likes:
          type: array
          items:
            type: string
        dislikes:
          type: array
          items:
            type: string
        allergies:
          type: array
          items:
            type: string
        is_temporary:
          type: boolean
        allow_marketing:
          type: boolean
        allow_direct_mail:
          type: boolean
        allow_surveys:
          type: boolean
        is_incognito:
          description: If true, indicates that the customer should not be greeted by name (e.g. in phone calls, etc.)
          type: boolean
        addresses:
          type: array
          description: "[PII] Customer addresses"
          items:
            $ref: "#/components/schemas/Address"
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/MembershipEmbed"
        parent_shop_id:
          description: The ID of the venue which is the primary relationship holder for the Customer.
          type: string
          format: bson-id
        merged_customer_ids:
          description: The IDs of other Customers which were merged into this Customer. Used for reconciliation purposes. Note that since the other Customers are destroyed after merging, it will no longer be possible to query for their ID.
          type: array
          items:
            type: string
            format: bson-id
        visits_count:
          description: The number of past visits by the Customer.
          type: integer
          readOnly: true
        cancels_count:
          description: The number of cancelled Reservations for the Customer.
          type: integer
          readOnly: true
        noshows_count:
          description: The number of no-show Reservations for the Customer.
          type: integer
          readOnly: true
        visits_count_by_shop_id:
          description: The number of past visits by the Customer, broken down by Shop.
          type: object
          additionalProperties:
            type: integer
          readOnly: true
        previous_visit_at:
          description: The timestamp of the Customer's most recent past visit.
          type: string
          format: date-time
          nullable: true
          readOnly: true
        next_visit_at:
          description: The timestamp of the Customer's next upcoming visit.
          type: string
          format: date-time
          nullable: true
          readOnly: true

    CustomerUpdateParams:
      type: object
      required:
