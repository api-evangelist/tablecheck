    Phone:
      type: object
      required:
        - number
      properties:
        id:
          description: The database ID of the Phone object.
          type: string
          format: bson-id
        number:
          description: "[PII] The phone number in E.164 format."
          type: string
          format: phone-e164
        tag:
          type: string
          enum: ["none","home","work","mobile","assistant","fax","other"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Social:
      type: object
      required:
        - username
      properties:
        id:
          description: The database ID of the Social object.
          type: string
          format: bson-id
        service:
          type: string
          enum: ["facebook","google","twitter","line","kakao","naver","yahoo","mixi","ameblo","linkedin","skype","wechat","weibo","qq"]
        username:
          description: "[PII] The social media username."
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Event:
      type: object
      example:
        date: '01-01-2020'
        tag: anniversary
      properties:
        id:
          description: The database ID of the Event.
          type: string
          format: bson-id
        tag:
          type: string
          enum: ["anniversary","birthday","single","1_month","2_month","3_month","6_month","1_year"]
        date:
          description: "[PII] The first occurrence date of the event. Note the year value 9996 means the year is unspecified."
          type: string
          format: date
        months:
          description: The integer month(s) in which the event occurs, with January = 1, February = 2, etc.
          type: array
          items:
            type: number
            format: integer
        day:
          description: The day on which the event occurs.
          type: number
          format: integer
        memo:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Address:
      type: object
      example:
        tag: home
        street: 123 Main St
        city: Seattle
        state: WA
        country: US
      properties:
        id:
          description: The database ID of the Address object.
          type: string
          format: bson-id
        tag:
          type: string
          description: A tag which indicates the type of address.
          enum: ["none","home","work","other"]
        street:
          type: string
          description: "[PII] The first line of the street address."
        street2:
          type: string
          description: "[PII] The second line of the street address."
        city:
          type: string
          description: "[PII] The city of the address."
        region:
          type: string
          description: "[PII] The region, state, province, or prefecture of the address."
        postal_code:
          type: string
          description: "[PII] The postal code of the address."
        country:
          description: The ISO 3166 Alpha-2 code of the country.
          type: string
          format: iso-country
          example: "JP"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

