        base_count_cancels:
          description: Base count cancels
          type: number
          format: integer
        base_count_noshows:
          description: Base count noshows
          type: number
          format: integer
        email_marketing:
          description: Email marketing
          type: boolean
        email_reminders:
          description: Email reminders
          type: boolean
        direct_mail:
          description: Direct mail
          type: boolean
        is_incognito:
          description: Is incognito
          type: boolean
        is_temporary:
          description: Is temporary
          type: boolean
        memo:
          description: Memo
          type: string
        shop_memos:
          description: Shop-specific customer memos.
          type: array
          items:
            $ref: "#/components/schemas/CustomerShopMemo"
        allow_surveys:
